<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth website</title>
</head>
<!-- this brings the external library(axios) to send request to the backend-->
<script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.7.7/axios.min.js"></script>

<script>
    async function signup() {
        const username = document.getElementById("signup-username").value;
        const password = document.getElementById("signup-password").value;

        const response = await axios.post("http://localhost:3000/signup", {
            username: username,
            password: password,
        });
        alert("signed up successfully")
    }

    async function signin() {
        const username = document.getElementById("signin-username").value;
        const password = document.getElementById("signin-password").value;

        const respose = await axios.post("http://localhost:3000/signin", {
            username: username,
            password: password,
        });
        localStorage.setItem("token", respose.data.token);

        alert("Signed in successfully");
    }
    
</script>
<body>
    <div>
        Signup
        <input id="signup-username" type="text" name="username" id="Username">
        <input id="signup-password" type="password" name="password" id="Password">
        <button onclick="signup()">Submit</button>
    </div>

    <div>
        signin
        <input id="signin-username" type="text" name="username" id="Username">
        <input id="signin-password" type="password" name="password" id="Password">
        <button onclick="signin()"">Submit</button>
    </div>

    <div>
        User information:
        <div id="information"></div>
    </div>

    <div>
        <button onclick="logout()">Logout</button>
    </div>
</body>
</html>

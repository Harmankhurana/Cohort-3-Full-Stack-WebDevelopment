<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth website</title>
</head>
<!-- this brings the external library(axios) to send request to the backend-->
<script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.7.7/axios.min.js"></script>

<script>
    /*
        ============================
        SIGNUP FUNCTION
        ============================
        - Writing the signup function
        - Collects username & password
        - Sends them to backend (/signup)
        - Used for creating a new user
    */

    async function signup() {
        const username = document.getElementById("signup-username").value;
        const password = document.getElementById("signup-password").value;

        const response = await axios.post("http://localhost:3000/signup", {
            username: username,
            password: password,
        });
        // Alert user after sccessful signup
        alert("signed up successfully")
    }

    /*
        ============================
        SIGNIN FUNCTION
        ============================
        - Writing the signin function
        - Logs in the user
        - Backend returns a JWT token
        - Token is stored in localStorage
    */
    async function signin() {
        const username = document.getElementById("signin-username").value;
        const password = document.getElementById("signin-password").value;

        const respose = await axios.post("http://localhost:3000/signin", {
            username: username,
            password: password,
        });
        localStorage.setItem("token", respose.data.token); // Storing the data/token in local storage

        alert("Signed in successfully");
    }


    /*
        ============================
        GET USER INFORMATION
        ============================
        - Writing the getUserInformation function
        - Fetches logged-in user data
        - Uses token for authentication
        - Calls /me endpoint
    */
    async function getUserInformation() {
        const token = localStorage.getItem("token");

        if (token) {
            const response = await axios.get("http://localhost:3000/me", {
                headers: {
                    Authorization: token
                }
            });
            document.getElementById("information").innerHTML = response.data.username;
        }
        getUserInformation();
    }
    
    // Writing the logout function
    async function logout() {
        localStorage.removeItem("token");
        alert("Logged out successfully");
    }
</script>
<body>
    <div>
        Signup
        <input id="signup-username" type="text" name="username" id="Username">
        <input id="signup-password" type="password" name="password" id="Password">
        <button onclick="signup()">Submit</button>
    </div>

    <div>
        signin
        <input id="signin-username" type="text" name="username" id="Username">
        <input id="signin-password" type="password" name="password" id="Password">
        <button onclick="signin()"">Submit</button>
    </div>

    <div>
        User information:
        <div id="information"></div>
    </div>

    <div>
        <button onclick="logout()">Logout</button>
    </div>
</body>
</html>
